[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "gitpopular"
version = "0.1.0"
description = "Daily GitHub AI rising-stars report generated from GH Archive, GitHub REST, and Codex."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.27",
]

[project.optional-dependencies]
api = [
  "openai>=1.99.0",
]
dev = [
  "pytest>=8.0",
]

[tool.setuptools.packages.find]
include = ["gitpopular*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
