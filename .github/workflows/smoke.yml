name: Manual Raw Collection Smoke Test

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Report date in Asia/Shanghai, YYYY-MM-DD. Defaults to yesterday."
        required: false
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      INPUT_DATE: ${{ inputs.date }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e .
      - name: Run raw collection smoke
        run: |
          if [ -n "$INPUT_DATE" ]; then
            REPORT_DATE="$INPUT_DATE"
          else
            REPORT_DATE="$(TZ=Asia/Shanghai date -d 'yesterday' +%F)"
          fi
          python -m gitpopular collect \
            --date "$REPORT_DATE" \
            --timezone Asia/Shanghai \
            --limit 1 \
            --candidate-pool 50 \
            --output /tmp/gitpopular-smoke
