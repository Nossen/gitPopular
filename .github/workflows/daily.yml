name: Daily AI Rising Stars

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional report date in Asia/Shanghai, YYYY-MM-DD"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      GITHUB_TOKEN: ${{ github.token }}
      INPUT_DATE: ${{ inputs.date }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e .
      - name: Generate report
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY secret is required."
            exit 1
          fi
          if [ -n "$INPUT_DATE" ]; then
            REPORT_DATE="$INPUT_DATE"
          else
            REPORT_DATE="$(TZ=Asia/Shanghai date -d 'yesterday' +%F)"
          fi
          python -m gitpopular run --date "$REPORT_DATE" --timezone Asia/Shanghai --limit 10
      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No report changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data reports
          git commit -m "chore: update AI rising stars report"
          git push
