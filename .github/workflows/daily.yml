name: Daily Raw AI Rising Stars Collection

on:
  schedule:
    # Primary: 09:30 Asia/Shanghai. Backups cover GitHub schedule delays/drops.
    - cron: "30 1 * * *"
    - cron: "30 3 * * *"
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional report date in Asia/Shanghai, YYYY-MM-DD"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: daily-raw-ai-rising-stars
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      INPUT_DATE: ${{ inputs.date }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e .
      - name: Collect raw report
        run: |
          if [ -n "$INPUT_DATE" ]; then
            REPORT_DATE="$INPUT_DATE"
          else
            REPORT_DATE="$(TZ=Asia/Shanghai date -d 'yesterday' +%F)"
          fi
          python -m gitpopular collect --date "$REPORT_DATE" --timezone Asia/Shanghai --limit 10 --candidate-pool 150
      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No report changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw reports/raw
          git commit -m "chore: collect raw AI rising stars report"
          git push
